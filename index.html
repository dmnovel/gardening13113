nd:var(--accent);border-color:var(--accent);color:#fff}.clear-date-btn{width:auto!important;min-height:34px!important;padding:0 12px!important;background:#fff!important;color:var(--brown)!important;border-color:#d8c8be!important;border-radius:999px!important;font-size:12px!important}

</style></head><body><div class="top-link-row"><a class="back-to-main" href="https://dmnovel.github.io/events/" target="_self" rel="noopener noreferrer">← 이벤트 메인으로</a><div class="top-actions"><button class="top-menu-btn" id="dateIndexBtn" type="button">목록</button><button class="blank-top-btn small" id="futureTopBtn" type="button" disabled aria-label="준비 중"></button></div></div><main class="page" id="top"><header><h1 class="title">리디북스 BL 할인율 검색(노정토리전용)</h1><p class="desc">※전적으로 저를 믿으시면 안됩니다. <br>누락 및 오기입 노정에서 더블체크하세요</p></header><section class="panel" aria-label="검색 및 필터"><div class="search-row"><div><label for="q">통합검색</label><input id="q" type="search" placeholder="제목 또는 작가 검색" autocomplete="off"></div><div><label>&nbsp;</label><button id="searchBtn" type="button">검색</button></div></div><div class="quick-row"><div><label for="sortBy">정렬</label><select id="sortBy"><option value="default">기본순</option><option value="titleAsc">제목 가나다순</option><option value="authorAsc">작가 가나다순</option></select></div><div><label>&nbsp;</label><button id="resetBtn" class="secondary" type="button">초기화</button></div><div><label>&nbsp;</label><button id="detailToggleBtn" class="secondary detail-toggle-btn" type="button" aria-expanded="true" aria-controls="detailRow" title="상세검색 접기">⌃</button></div></div><div class="detail-row" id="detailRow"><div><label for="titleOnly">제목만 검색</label><input id="titleOnly" type="search" placeholder="제목에 포함될 단어" autocomplete="off"></div><div><label for="authorOnly">작가만 검색</label><input id="authorOnly" type="search" placeholder="작가명" autocomplete="off"></div><div><label for="discountRate">할인율</label><select id="discountRate"><option value="">전체 할인율</option></select></div><div><label for="exclude">제외어</label><input id="exclude" type="search" placeholder="제목/작가에서 제외" autocomplete="off"></div></div></section><section class="summary"><div class="count">검색 결과 <strong id="resultCount">0</strong>개</div><div id="activeSummary" class="active-summary">필터 없음</div></section><section id="list" class="list" aria-label="작품 목록"></section><div id="empty" class="empty prompt hidden">검색값을 입력하세요</div><div id="error" class="error hidden"></div><div id="loadMoreWrap" class="load-more-wrap hidden"><button id="loadMoreBtn" type="button">더보기</button></div><div id="bottomAnchor"></div></main><div id="historyModalBackdrop" class="history-modal-backdrop" aria-hidden="true"><section class="history-modal" role="dialog" aria-modal="true" aria-labelledby="historyModalTitle"><div class="history-head"><h2 id="historyModalTitle">과거 할인율</h2><button id="historyModalClose" class="history-close" type="button" aria-label="닫기">×</button></div><p id="historyModalMeta" class="history-meta"></p><div id="historyModalBody" class="history-list"></div></section></div><div id="dateIndexBackdrop" class="date-index-backdrop" aria-hidden="true"><section class="date-index-modal" role="dialog" aria-modal="true" aria-labelledby="dateIndexTitle"><div class="history-head"><h2 id="dateIndexTitle">정리된 출현연월</h2><button id="dateIndexClose" class="history-close" type="button" aria-label="닫기">×</button></div><p class="date-index-desc">누락주의</p><div id="dateIndexBody" class="date-index-list"></div></section></div><div class="float-nav" aria-label="페이지 이동"><button id="goTopBtn" type="button" aria-label="맨 위로">↑</button><button id="goBottomBtn" type="button" aria-label="맨 아래로">↓</button></div><script>
const PAGE_SIZE=100;
const state={items:[],filtered:[],visibleCount:PAGE_SIZE,selectedHistoryDate:""};
const els={q:document.getElementById('q'),searchBtn:document.getElementById('searchBtn'),sortBy:document.getElementById('sortBy'),resetBtn:document.getElementById('resetBtn'),titleOnly:document.getElementById('titleOnly'),authorOnly:document.getElementById('authorOnly'),exclude:document.getElementById('exclude'),discountRate:document.getElementById('discountRate'),resultCount:document.getElementById('resultCount'),activeSummary:document.getElementById('activeSummary'),list:document.getElementById('list'),empty:document.getElementById('empty'),error:document.getElementById('error'),loadMoreWrap:document.getElementById('loadMoreWrap'),loadMoreBtn:document.getElementById('loadMoreBtn'),goTopBtn:document.getElementById('goTopBtn'),goBottomBtn:document.getElementById('goBottomBtn'),bottomAnchor:document.getElementById('bottomAnchor'),detailToggleBtn:document.getElementById('detailToggleBtn'),detailRow:document.getElementById('detailRow')};
function normalizeText(value){return String(value??'').trim().toLowerCase().replace(/\s+/g,'')}
function toNumber(value){if(typeof value==='number')return value;const text=String(value??'').replace(/[^\d.-]/g,'');const num=Number(text);return Number.isFinite(num)?num:0}
function historyCount(value){return String(value||'').split(',').map(v=>v.trim()).filter(Boolean).length}
function normalizeItem(item,index){
const title=String(item.title??'').trim();
const author=String(item.author??'').trim();
const history=String(item.history??item.pastDiscount??item['과거할인율']??'').trim();
const historyItems=parseHistory(history);
const latest=latestHistoryEntry(history);
return{
workId:String(item.workId??item.id??'').trim(),
title,author,
_titleNorm:normalizeText(title),
_authorNorm:normalizeText(author),
_joinedNorm:normalizeText(title+author),
link:String(item.link??'').trim(),
discount:toNumber(item.discount),
price:toNumber(item.price),
type:String(item.type??'').trim(),
history,
_historyItems:historyItems,
_historyCache:null,
appearCount:historyItems.length,
latestEntry:latest,
originalIndex:index
}}
function hasSearchCriteria(){return Boolean(els.q.value.trim()||els.titleOnly.value.trim()||els.authorOnly.value.trim()||els.exclude.value.trim()||els.discountRate.value||state.selectedHistoryDate)}
function getRateKey(value){const m=String(value||'').match(/(\d+)\s*%/);return m?m[1]:''}
function historyMatchesSelected(item){const selectedDate=state.selectedHistoryDate,selectedRate=els.discountRate.value;if(!selectedDate&&!selectedRate)return true;return item._historyItems.some(entry=>{if(selectedDate&&entry.date!==selectedDate)return false;if(selectedRate&&getRateKey(entry.rate)!==selectedRate)return false;return true})}
function applyFilters(){const hasCriteria=hasSearchCriteria();if(!hasCriteria){state.filtered=[];state.visibleCount=PAGE_SIZE;updateSummary();render(true);return}const q=normalizeText(els.q.value),titleOnly=normalizeText(els.titleOnly.value),authorOnly=normalizeText(els.authorOnly.value),exclude=normalizeText(els.exclude.value);let result=state.items.filter(item=>{const title=item._titleNorm,author=item._authorNorm,joined=item._joinedNorm;if(!historyMatchesSelected(item))return false;if(q&&!(title.includes(q)||author.includes(q)))return false;if(titleOnly&&!title.includes(titleOnly))return false;if(authorOnly&&!author.includes(authorOnly))return false;if(exclude&&joined.includes(exclude))return false;return true});state.filtered=applySort(result);state.visibleCount=PAGE_SIZE;updateSummary();render(false)}
function applySort(list){const sort=els.sortBy.value,arr=[...list];const byText=f=>(a,b)=>String(a[f]||'').localeCompare(String(b[f]||''),'ko-KR',{numeric:true});if(sort==='titleAsc')arr.sort(byText('title'));if(sort==='authorAsc')arr.sort(byText('author'));if(sort==='default')arr.sort((a,b)=>a.originalIndex-b.originalIndex);return arr}
function updateSummary(){const p=[];if(state.selectedHistoryDate)p.push(`출현연월: ${state.selectedHistoryDate}`);if(els.q.value.trim())p.push(`통합: ${els.q.value.trim()}`);if(els.sortBy.value!=='default')p.push(`정렬: ${els.sortBy.options[els.sortBy.selectedIndex].textContent}`);if(els.discountRate.value)p.push(`할인율: ${els.discountRate.value}%`);if(els.titleOnly.value.trim())p.push(`제목: ${els.titleOnly.value.trim()}`);if(els.authorOnly.value.trim())p.push(`작가: ${els.authorOnly.value.trim()}`);if(els.exclude.value.trim())p.push(`제외: ${els.exclude.value.trim()}`);els.activeSummary.textContent=p.length?p.join(' · '):'필터 없음'}
function makeSearchLink(item){const q=encodeURIComponent(String(item.title||'').trim());return q?`https://ridibooks.com/search?q=${q}&adult_exclude=n&tab=WEBNOVEL&child_tab=BL_WEBNOVEL`:''}
function parseHistory(value){return String(value||'').split(',').map(v=>v.trim()).filter(Boolean).map(v=>{const m=v.match(/^(\d{6}\S*)\s+(.*)$/);return m?{date:m[1],rate:m[2].trim()||'-'}:{date:'기록',rate:v}})}
function latestHistoryEntry(value){const entries=parseHistory(value).filter(entry=>entry.date&&entry.date!=='기록');if(!entries.length)return null;return [...entries].sort((a,b)=>String(b.date).slice(0,6).localeCompare(String(a.date).slice(0,6),'ko-KR',{numeric:true}))[0]}
function populateDiscountOptions(){const rates=[...new Set(state.items.flatMap(item=>parseHistory(item.history).map(entry=>getRateKey(entry.rate)).filter(Boolean)))].sort((a,b)=>Number(a)-Number(b));els.discountRate.innerHTML='<option value="">전체 할인율</option>'+rates.map(rate=>`<option value="${rate}">${rate}%</option>`).join('')}
function openHistoryModal(item){const backdrop=document.getElementById('historyModalBackdrop'),title=document.getElementById('historyModalTitle'),meta=document.getElementById('historyModalMeta'),body=document.getElementById('historyModalBody');title.textContent=item.title||'과거 할인율';meta.textContent=(item.author||'작가 정보 없음')+' · 과거 마크다운 할인율';body.innerHTML='';const entries=item._historyCache||(item._historyCache=item._historyItems);if(!entries.length){const empty=document.createElement('div');empty.className='history-empty';empty.textContent='정리된 과거 할인율이 없습니다.';body.appendChild(empty)}else{entries.forEach(entry=>{const row=document.createElement('div');row.className='history-row';const date=document.createElement('span');date.className='history-date';date.textContent=entry.date;const rate=document.createElement('span');rate.className='history-rate';rate.textContent=entry.rate;row.append(date,rate);body.appendChild(row)})}backdrop.classList.add('open');backdrop.setAttribute('aria-hidden','false');document.body.classList.add('modal-open')}
function closeHistoryModal(){const backdrop=document.getElementById('historyModalBackdrop');backdrop.classList.remove('open');backdrop.setAttribute('aria-hidden','true');document.body.classList.remove('modal-open')}
function getHistoryDateCounts(){const counts=new Map();state.items.forEach(item=>{new Set(item._historyItems.map(entry=>entry.date).filter(date=>date&&date!=='기록')).forEach(date=>counts.set(date,(counts.get(date)||0)+1))});return [...counts.entries()].sort((a,b)=>b[0].localeCompare(a[0],'ko-KR',{numeric:true}))}
function openDateIndex(){const backdrop=document.getElementById('dateIndexBackdrop'),body=document.getElementById('dateIndexBody');body.innerHTML='';const clearBtn=document.createElement('button');clearBtn.type='button';clearBtn.className='clear-date-btn';clearBtn.textContent=state.selectedHistoryDate?'선택 해제':'전체 목차';clearBtn.addEventListener('click',()=>{state.selectedHistoryDate='';closeDateIndex();applyFilters()});body.appendChild(clearBtn);getHistoryDateCounts().forEach(([date,count])=>{const btn=document.createElement('button');btn.type='button';btn.className='date-chip'+(state.selectedHistoryDate===date?' active':'');btn.textContent=date;btn.addEventListener('click',()=>{state.selectedHistoryDate=date;closeDateIndex();applyFilters()});body.appendChild(btn)});backdrop.classList.add('open');backdrop.setAttribute('aria-hidden','false');document.body.classList.add('modal-open')}
function closeDateIndex(){const backdrop=document.getElementById('dateIndexBackdrop');backdrop.classList.remove('open');backdrop.setAttribute('aria-hidden','true');document.body.classList.remove('modal-open')}
function render(isPrompt=false){const total=state.filtered.length,visible=state.filtered.slice(0,state.visibleCount);els.resultCount.textContent=total.toLocaleString('ko-KR');els.list.innerHTML='';els.empty.textContent=isPrompt?'검색값을 입력하세요':'조건에 맞는 작품이 없습니다.';els.empty.classList.toggle('prompt',isPrompt);els.empty.classList.toggle('hidden',isPrompt?false:total!==0);els.loadMoreWrap.classList.toggle('hidden',isPrompt||state.visibleCount>=total);if(isPrompt)return;const frag=document.createDocumentFragment();visible.forEach(item=>{const card=document.createElement('article');card.className='card';const info=document.createElement('div');info.className='card-info';const title=document.createElement(item.link?'a':'span');title.className='book-title'+(item.link?'':' no-link');title.textContent=item.title||'(제목 없음)';if(item.link){title.href=item.link;title.target='_blank';title.rel='noopener noreferrer'}const meta=document.createElement('p');meta.className='book-meta';meta.textContent=item.author||'작가 정보 없음';info.append(title,meta);const middle=document.createElement('div');middle.className='card-middle';const hCount=historyCount(item.history);if(hCount){const recent=latestHistoryEntry(item.history);const historySummary=document.createElement('div');historySummary.className='book-history-inline';const countLine=document.createElement('span');countLine.className='history-pill';countLine.textContent=`출현 ${hCount}회`;historySummary.appendChild(countLine);if(recent){const recentLine=document.createElement('span');recentLine.className='history-pill recent';recentLine.textContent=`최근 ${recent.date} ${recent.rate}`;historySummary.appendChild(recentLine)}middle.appendChild(historySummary)}const actions=document.createElement('div');actions.className='card-actions';const historyBtn=document.createElement('button');historyBtn.className='history-btn'+(item.history?'':' disabled');historyBtn.type='button';historyBtn.textContent='과거';historyBtn.title=item.history?'과거 할인율 보기':'정리된 과거 할인율 없음';if(item.history)historyBtn.addEventListener('click',()=>openHistoryModal(item));const move=document.createElement('a');move.className='move-btn';move.textContent='이동';move.href=item.link||makeSearchLink(item)||'#';move.target='_blank';move.rel='noopener noreferrer';actions.append(historyBtn,move);card.append(info,middle,actions);frag.appendChild(card)});els.list.appendChild(frag)}

function setDetailCollapsed(collapsed){
if(!els.detailToggleBtn||!els.detailRow)return;
els.detailRow.classList.toggle('mobile-collapsed',collapsed);
els.detailToggleBtn.textContent=collapsed?'⌄':'⌃';
els.detailToggleBtn.title=collapsed?'상세검색 펼치기':'상세검색 접기';
els.detailToggleBtn.setAttribute('aria-expanded',String(!collapsed));
}
function toggleDetailPanel(){
if(!window.matchMedia('(max-width:980px)').matches)return;
setDetailCollapsed(!els.detailRow.classList.contains('mobile-collapsed'));
}
function resetAll(){els.q.value='';els.sortBy.value='default';els.titleOnly.value='';els.authorOnly.value='';els.exclude.value='';els.discountRate.value='';state.selectedHistoryDate='';applyFilters()}
function debounce(fn,delay){let timer;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),delay)}}
function bindEvents(){els.searchBtn.addEventListener('click',applyFilters);[els.q,els.titleOnly,els.authorOnly,els.exclude].forEach(input=>{
input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();applyFilters()}});
});els.sortBy.addEventListener('change',applyFilters);els.discountRate.addEventListener('change',applyFilters);els.resetBtn.addEventListener('click',resetAll);if(els.detailToggleBtn)els.detailToggleBtn.addEventListener('click',toggleDetailPanel);els.loadMoreBtn.addEventListener('click',()=>{state.visibleCount+=PAGE_SIZE;render()});els.goTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));els.goBottomBtn.addEventListener('click',()=>els.bottomAnchor.scrollIntoView({behavior:'smooth'}));document.getElementById('historyModalClose').addEventListener('click',closeHistoryModal);document.getElementById('historyModalBackdrop').addEventListener('click',e=>{if(e.target.id==='historyModalBackdrop')closeHistoryModal()});document.getElementById('dateIndexBtn').addEventListener('click',openDateIndex);document.getElementById('dateIndexClose').addEventListener('click',closeDateIndex);document.getElementById('dateIndexBackdrop').addEventListener('click',e=>{if(e.target.id==='dateIndexBackdrop')closeDateIndex()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeHistoryModal();closeDateIndex()}})}
async function init(){bindEvents();setDetailCollapsed(window.matchMedia('(max-width:980px)').matches);try{const res=await fetch('./w_fzqkmze4ka6b.json',{cache:'no-store'});if(!res.ok)throw new Error('w_fzqkmze4ka6b.json을 불러오지 못했습니다.');const data=await res.json();if(!Array.isArray(data))throw new Error('works.json 형식이 배열이 아닙니다.');state.items=data.map(normalizeItem);populateDiscountOptions();state.filtered=[...state.items];applyFilters()}catch(err){els.error.textContent='w_fzqkmze4ka6b.json을 불러오지 못했습니다. index.html과 같은 위치에 w_fzqkmze4ka6b.json을 올려주세요.';els.error.classList.remove('hidden');console.error(err)}}
init();
